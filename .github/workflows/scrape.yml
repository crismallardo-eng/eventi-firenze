name: Scrape e pubblica eventi

on:
  schedule:
    # 5 tentativi distribuiti nella mattina italiana. Il cron di GitHub Actions
    # e' inaffidabile (salta run su piani free sotto carico), ma la probabilita'
    # che li salti TUTTI e 5 e' bassissima. I minuti dispari evitano le ore
    # tonde dove il carico e' massimo.
    - cron: '13 5 * * *'    # 07:13 IT estate / 06:13 IT inverno
    - cron: '37 6 * * *'    # 08:37 IT estate / 07:37 IT inverno
    - cron: '51 7 * * *'    # 09:51 IT estate / 08:51 IT inverno
    - cron: '19 9 * * *'    # 11:19 IT estate / 10:19 IT inverno
    - cron: '43 11 * * *'   # 13:43 IT estate / 12:43 IT inverno
  workflow_dispatch:        # consente lancio manuale dalla UI di GitHub
  push:
    branches: [main]

permissions:
  contents: write   # serve per committare health_history.jsonl e pushare gh-pages
  pages: write
  id-token: write
  issues: write     # serve per aprire issue su anomalie

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      anomalies: ${{ steps.health.outputs.anomalies }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Servono i commit precedenti per push back del file storico.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python run.py

      - name: Health check (appende storico + flagga anomalie)
        id: health
        run: |
          set +e
          python scripts/health_check.py
          rc=$?
          if [ $rc -eq 1 ]; then
            echo "anomalies=true" >> "$GITHUB_OUTPUT"
          else
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
          fi
          # exit 0 in entrambi i casi: l'apertura issue è gestita più sotto.
          exit 0

      - name: Commit storico health (se modificato)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/health_history.jsonl || true
          if git diff --staged --quiet; then
            echo "Nessuna modifica al file storico."
          else
            git commit -m "chore: aggiorna health history [skip ci]"
            git push
          fi

      - name: Prepare site (rename to index.html)
        run: |
          mkdir -p site
          cp output/eventi.html site/index.html

      - name: Deploy to gh-pages branch
        run: |
          cd site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy eventi $(date -u +%Y-%m-%d_%H:%M)"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
        continue-on-error: true

      - name: Apri issue se anomalie
        if: steps.health.outputs.anomalies == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Assicura che la label esista (idempotente).
          gh label create health-anomaly \
            --color 'b60205' \
            --description 'Fonte scraping in anomalia rilevata da health_check.py' \
            2>/dev/null || true

          DATE=$(date -u +%Y-%m-%d)
          # Evita di aprire issue duplicata per la stessa data.
          existing=$(gh issue list --label health-anomaly --state open --json number,title \
                      --jq ".[] | select(.title | contains(\"$DATE\")) | .number" | head -n1)
          if [ -n "$existing" ]; then
            echo "Issue per $DATE già aperta (#$existing), aggiungo commento."
            gh issue comment "$existing" --body-file output/health_report.md
          else
            gh issue create \
              --title "⚠️ Anomalie scraping · $DATE" \
              --body-file output/health_report.md \
              --label health-anomaly
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    continue-on-error: true
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        continue-on-error: true
