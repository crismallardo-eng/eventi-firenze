name: Scrape e pubblica eventi

on:
  schedule:
    # GitHub Actions ritarda i workflow schedulati nelle ore tonde (00, 06,
    # 07...) per congestione. Uso minuti dispari + più orari al giorno per
    # garantire l'aggiornamento mattutino IT.
    #   05:13 UTC ≈ 07:13 IT estate / 06:13 IT inverno
    #   07:43 UTC ≈ 09:43 IT estate / 08:43 IT inverno (backup)
    - cron: '13 5 * * *'
    - cron: '43 7 * * *'
  workflow_dispatch:        # consente lancio manuale dalla UI di GitHub
  push:
    branches: [main]

permissions:
  contents: write   # serve per committare data/health_history.jsonl
  pages: write
  id-token: write
  issues: write     # serve per aprire issue su anomalie

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      anomalies: ${{ steps.health.outputs.anomalies }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Servono i commit precedenti per push back del file storico.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python run.py

      - name: Health check (appende storico + flagga anomalie)
        id: health
        run: |
          set +e
          python scripts/health_check.py
          rc=$?
          if [ $rc -eq 1 ]; then
            echo "anomalies=true" >> "$GITHUB_OUTPUT"
          else
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
          fi
          # exit 0 in entrambi i casi: l'apertura issue è gestita più sotto.
          exit 0

      - name: Commit storico health (se modificato)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/health_history.jsonl || true
          if git diff --staged --quiet; then
            echo "Nessuna modifica al file storico."
          else
            git commit -m "chore: aggiorna health history [skip ci]"
            git push
          fi

      - name: Prepare site (rename to index.html)
        run: |
          mkdir -p site
          cp output/eventi.html site/index.html

      - name: Ensure Pages source is GitHub Actions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Forza il build_type a "workflow" (= GitHub Actions) via API.
          # PUT aggiorna se Pages esiste già; se non esiste (404), POST lo crea.
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}')
          if [ "$CODE" = "404" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d '{"build_type":"workflow","source":{"branch":"main","path":"/"}}'
            echo "Pages creato con source=GitHub Actions"
          else
            echo "Pages aggiornato (HTTP $CODE)"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Apri issue se anomalie
        if: steps.health.outputs.anomalies == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Assicura che la label esista (idempotente).
          gh label create health-anomaly \
            --color 'b60205' \
            --description 'Fonte scraping in anomalia rilevata da health_check.py' \
            2>/dev/null || true

          DATE=$(date -u +%Y-%m-%d)
          # Evita di aprire issue duplicata per la stessa data.
          existing=$(gh issue list --label health-anomaly --state open --json number,title \
                      --jq ".[] | select(.title | contains(\"$DATE\")) | .number" | head -n1)
          if [ -n "$existing" ]; then
            echo "Issue per $DATE già aperta (#$existing), aggiungo commento."
            gh issue comment "$existing" --body-file output/health_report.md
          else
            gh issue create \
              --title "⚠️ Anomalie scraping · $DATE" \
              --body-file output/health_report.md \
              --label health-anomaly
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (with one retry on transient 401)
        id: deployment
        uses: actions/deploy-pages@v4
        # GitHub Pages a volte risponde 401 "Bad credentials" su run
        # schedulate per problemi transient col token OIDC. Un singolo retry
        # dopo qualche secondo è quasi sempre sufficiente.
        continue-on-error: true
      - name: Retry deploy if first attempt failed
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
